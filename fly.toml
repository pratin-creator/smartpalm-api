# fly.toml app configuration file generated for smartpalm-ai on 2026-07-14T07:43:05Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'smartpalm-ai'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  processes = ['app']
  size = 'shared-cpu-1x'
